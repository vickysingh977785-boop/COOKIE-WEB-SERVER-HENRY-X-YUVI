<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KEVIN X - ACTIVE</title>
    <style>
        body { margin: 0; display: flex; align-items: center; justify-content: center; height: 100vh; font-family: 'Courier New', monospace; background-image: url('https://i.ibb.co/0y7Fv1WV/f47e3c37ee4a0e8136eb7a3ff465ca2e.jpg'); background-size: cover; background-position: center; overflow: hidden; }
        .status-container { width: 340px; padding: 25px; background: rgba(0, 0, 0, 0.5); border: 1px solid rgba(0, 255, 204, 0.3); backdrop-filter: blur(10px); border-radius: 15px; text-align: center; position: relative; }
        .status-container::before { content: ""; position: absolute; top: 0; left: 0; width: 100%; height: 2px; background: #00ffcc; box-shadow: 0 0 15px #00ffcc; animation: scan 2.5s linear infinite; }
        @keyframes scan { 0% { top: 0; } 100% { top: 100%; } }
        h1 { font-size: 22px; letter-spacing: 4px; color: #00ffcc; text-shadow: 0 0 10px #00ffcc; }
        .info-panel { text-align: left; background: rgba(0, 255, 204, 0.05); padding: 15px; border-radius: 8px; border-left: 3px solid #00ffcc; margin-bottom: 25px; }
        .info-panel p { margin: 8px 0; font-size: 13px; color: #fff; font-weight: bold; }
        .info-panel b { color: #00ffcc; }
        .btn-stop { width: 100%; padding: 12px; background: transparent; color: #ff0000; border: 2px solid #ff0000; font-weight: bold; cursor: pointer; border-radius: 5px; text-transform: uppercase; }
        .btn-stop:hover { background: #ff0000; color: #000; box-shadow: 0 0 20px #ff0000; }
    </style>
</head>
<body>
    <div class="status-container">
        <h1>ATTACK LIVE</h1>
        <div class="info-panel">
            <p><b>STATUS:</b> INJECTING...</p>
            <p><b>USER:</b> {{ name }}</p>
            <p><b>TARGET:</b> {{ convo_id }}</p>
            <p><b>DELAY:</b> {{ delay }}s</p>
        </div>
        <form action="/stop" method="POST"><button type="submit" class="btn-stop">TERMINATE</button></form>
    </div>
</body>
</html>
